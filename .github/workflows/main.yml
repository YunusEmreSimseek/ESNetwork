name: ESNetwork CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Swift Tests
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Default Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Run Unit Tests
      run: swift test -v